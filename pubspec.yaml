name: hairstyle_ai_app
description: "AI hairstyle and beard try-on app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/tour/
    - assets/MainPanel/
